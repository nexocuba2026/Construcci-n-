<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Enchapes</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter', sans-serif; background:#f5f5f7; padding:20px; display:flex; justify-content:center; }
        .container { max-width:800px; width:100%; background:#fff; border-radius:24px; padding:36px 28px; }
        .back-link { color:#86868b; text-decoration:none; margin-bottom:24px; display:block; }
        h1 { font-size:1.8rem; font-weight:600; }
        .subtitle { color:#86868b; margin-bottom:32px; }
        .form-group { margin-bottom:20px; }
        label { font-weight:500; font-size:0.9rem; display:block; margin-bottom:6px; }
        select, input { width:100%; padding:12px; border:1px solid #d2d2d7; border-radius:12px; font-size:0.95rem; }
        .row { display:flex; gap:16px; }
        .row .form-group { flex:1; }
        .btn { width:100%; padding:14px; background:#1d1d1f; color:#fff; border:none; border-radius:14px; cursor:pointer; margin-top:8px; }
        .results { margin-top:28px; padding:28px; background:#f9f9fb; border-radius:20px; display:none; }
        .results.visible { display:block; }
        .tabla-materiales { width:100%; border-collapse:collapse; font-size:0.75rem; margin-bottom:20px; }
        .tabla-materiales th { text-align:left; color:#86868b; padding:6px 4px; border-bottom:1px solid #d2d2d7; }
        .tabla-materiales td { padding:6px 4px; border-bottom:1px solid #f0f0f2; }
        .totales { font-weight:600; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Volver al inicio</a>
    <h1>Cálculo de Enchapes</h1>
    <p class="subtitle">Azulejos y cerámicas</p>

    <div class="form-group"><label>Tipo</label><select id="tipoEnchape"><option value="">--</option><option value="pared">Pared</option><option value="piso">Piso</option></select></div>
    <div class="row">
        <div class="form-group"><label>Largo (m)</label><input type="number" id="largo" placeholder="4.0"></div>
        <div class="form-group"><label>Alto (m)</label><input type="number" id="alto" placeholder="2.5"></div>
    </div>
    <div class="row">
        <div class="form-group"><label>Precio cerámica (CUP/m²)</label><input type="number" id="precioCeramica" placeholder="200"></div>
        <div class="form-group"><label>Precio adhesivo saco 25kg</label><input type="number" id="precioAdhesivo" placeholder="150"></div>
    </div>
    <div class="form-group"><label>Precio fragua (CUP/kg)</label><input type="number" id="precioFragua" placeholder="8"></div>
    <div class="form-group"><label>Desperdicio (%)</label><select id="desperdicio"><option value="0">0%</option><option value="3" selected>3%</option><option value="5">5%</option><option value="7">7%</option><option value="10">10%</option></select></div>
    <div class="form-group"><label>Mano de obra</label><select id="manoObra"><option value="">--</option><option value="precons">Precons III</option><option value="mipyme">MiPyme</option><option value="particular">Particular</option></select></div>
    <button class="btn" id="calcularBtn">Calcular</button>

    <div class="results" id="resultados">
        <h2>Resultado</h2>
        <table class="tabla-materiales"><thead><tr><th>Material</th><th>Cantidad</th><th>Unidad</th><th>Precio unit.</th><th>Importe</th></tr></thead><tbody></tbody></table>
        <p class="totales"><strong>Total Materiales:</strong> <span id="totalMateriales"></span> CUP</p>
        <table class="tabla-materiales"><thead><tr><th>Mano de obra</th><th>Hombres</th><th>Tiempo</th><th>Precio</th></tr></thead><tbody id="tablaManoObra"></tbody></table>
        <p class="totales"><strong>Total Mano de Obra:</strong> <span id="totalManoObra"></span> CUP</p>
        <p style="font-size:1.1rem;"><strong>Gran Total:</strong> <span id="granTotal"></span> CUP</p>
        <div class="explanation" id="explicacion"></div>
    </div>
</div>
<script>
(function(){
    const calcBtn = document.getElementById('calcularBtn');
    function getVal(id,def=0){ const el=document.getElementById(id); if(!el) return def; const v=parseFloat(el.value); return isNaN(v)?def:v; }
    calcBtn.addEventListener('click', ()=>{
        const tipo = document.getElementById('tipoEnchape').value;
        const largo = getVal('largo'), alto = getVal('alto');
        const desperdicio = parseFloat(document.getElementById('desperdicio').value)/100;
        const manoTipo = document.getElementById('manoObra').value;
        if(!tipo || isNaN(largo) || isNaN(alto) || largo<=0 || alto<=0 || !manoTipo){ alert('Complete los campos'); return; }
        const area = largo*alto;
        const precioCer = getVal('precioCeramica',200), precioAdh = getVal('precioAdhesivo',150), precioFrag = getVal('precioFragua',8);
        const areaDesp = area*(1+desperdicio);
        const cerM2 = Math.ceil(areaDesp);
        const adhSacos = Math.ceil(areaDesp*4/25);
        const fragKg = Math.ceil(area*0.3);
        const impCer = cerM2*precioCer, impAdh = adhSacos*precioAdh, impFrag = fragKg*precioFrag;
        const totalMat = impCer+impAdh+impFrag;
        document.querySelector('#tablaMateriales tbody').innerHTML = `<tr><td>Cerámica</td><td>${cerM2}</td><td>m²</td><td>${precioCer.toFixed(2)}</td><td>${impCer.toFixed(2)}</td></tr><tr><td>Adhesivo</td><td>${adhSacos}</td><td>sacos</td><td>${precioAdh.toFixed(2)}</td><td>${impAdh.toFixed(2)}</td></tr><tr><td>Fragua</td><td>${fragKg}</td><td>kg</td><td>${precioFrag.toFixed(2)}</td><td>${impFrag.toFixed(2)}</td></tr>`;
        document.getElementById('totalMateriales').textContent = totalMat.toFixed(2);
        const preciosMO = { precons:300, mipyme:250, particular:380 };
        const importeMO = preciosMO[manoTipo]*area;
        document.getElementById('tablaManoObra').innerHTML = `<tr><td>${manoTipo==='precons'?'Precons III':manoTipo==='mipyme'?'MiPyme':'Particular'}</td><td>2 (1 of. + 1 ayud.)</td><td>${Math.ceil(area/5)} día(s)</td><td>${importeMO.toFixed(2)} CUP</td></tr>`;
        document.getElementById('totalManoObra').textContent = importeMO.toFixed(2);
        document.getElementById('granTotal').textContent = (totalMat+importeMO).toFixed(2);
        document.getElementById('explicacion').textContent = `Enchape en ${tipo}. Incluye adhesivo y fragua.`;
        document.getElementById('resultados').classList.add('visible');
    });
})();
</script>
</body>
</html>
