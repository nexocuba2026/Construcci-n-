<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cálculo de Estructuras</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px;}
.container{max-width:800px;width:100%;background:#fff;border-radius:24px;padding:36px 28px;box-shadow:0 8px 30px rgba(0,0,0,0.04),0 2px 6px rgba(0,0,0,0.03);margin:20px 0;}
.back-link{display:inline-block;margin-bottom:24px;color:#86868b;text-decoration:none;font-size:0.9rem;}
.back-link:hover{color:#1d1d1f;}
h1{font-size:1.8rem;font-weight:600;letter-spacing:-0.5px;margin-bottom:8px;}
.subtitle{font-size:0.95rem;color:#86868b;margin-bottom:32px;}
.form-group{margin-bottom:20px;}
label{display:block;font-weight:500;font-size:0.9rem;margin-bottom:6px;color:#1d1d1f;}
select,input{width:100%;padding:12px 16px;border:1px solid #d2d2d7;border-radius:12px;font-size:0.95rem;font-family:inherit;background:#f9f9fb;transition:border-color 0.2s, box-shadow 0.2s;appearance:none;-webkit-appearance:none;}
select{background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg'...");}
input:focus,select:focus{outline:none;border-color:#86868b;box-shadow:0 0 0 3px rgba(0,0,0,0.04);}
.row{display:flex;gap:16px;flex-wrap:wrap;}
.row .form-group{flex:1;min-width:140px;}
.btn{display:block;width:100%;padding:14px;background:#1d1d1f;color:#fff;border:none;border-radius:14px;font-size:1rem;font-weight:500;cursor:pointer;margin-top:8px;}
.btn:hover{background:#2d2d2f;}
.btn:active{transform:scale(0.98);}
.btn-copy{background:transparent;color:#1d1d1f;border:1px solid #d2d2d7;margin-top:12px;}
.btn-copy:hover{background:#f5f5f7;border-color:#86868b;}
.results{margin-top:36px;padding:28px;background:#f9f9fb;border-radius:20px;display:none;overflow-x:auto;}
.results.visible{display:block;}
.results h2{font-size:1.3rem;font-weight:600;margin-bottom:20px;}
.tabla-materiales{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:0.75rem;}
.tabla-materiales th{text-align:left;font-weight:500;color:#86868b;padding:6px 4px;border-bottom:1px solid #d2d2d7;}
.tabla-materiales td{padding:6px 4px;border-bottom:1px solid #f0f0f2;}
.totales{font-weight:600;margin-bottom:12px;}
.explanation{margin-top:24px;font-size:0.8rem;color:#86868b;line-height:1.5;border-top:1px solid #e5e5ea;padding-top:16px;}
.copy-notice{display:inline-block;margin-left:8px;font-size:0.8rem;color:#34c759;opacity:0;transition:opacity 0.3s;}
.copy-notice.show{opacity:1;}
@media(max-width:480px){.container{padding:24px 18px;}.row{flex-direction:column;gap:0;}}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back-link">← Volver al inicio</a>
<h1>Cálculo de Estructuras</h1>
<p class="subtitle">Columnas, vigas y losas de concreto armado</p>

<div class="form-group"><label for="tipoEstructura">Tipo de elemento</label>
    <select id="tipoEstructura">
        <option value="">-- Seleccione --</option>
        <option value="columna">Columna</option>
        <option value="viga">Viga</option>
        <option value="losa">Losa maciza</option>
    </select>
</div>

<div id="opcionesDimensiones"></div>

<div class="row">
    <div class="form-group"><label for="tipoCemento">Tipo de cemento</label><select id="tipoCemento"><option value="P250">P-250</option><option value="P350">P-350</option></select></div>
    <div class="form-group"><label for="precioCemento">Precio bolsa 42.5 kg (CUP)</label><input type="number" id="precioCemento" placeholder="380" step="0.01"></div>
</div>
<div class="row">
    <div class="form-group"><label for="precioArena">Precio arena (CUP/m³)</label><input type="number" id="precioArena" placeholder="280" step="0.01"></div>
    <div class="form-group"><label for="precioGrava">Precio grava (CUP/m³)</label><input type="number" id="precioGrava" placeholder="300" step="0.01"></div>
</div>
<div class="row">
    <div class="form-group"><label for="precioAcero">Precio acero (CUP/kg)</label><input type="number" id="precioAcero" placeholder="22" step="0.01"></div>
    <div class="form-group"><label for="cuantiaAcero">Acero (kg/m³)</label><input type="number" id="cuantiaAcero" placeholder="100" value="100" step="1"></div>
</div>
<div class="form-group"><label for="desperdicio">Desperdicio (%)</label>
    <select id="desperdicio"><option value="0">0%</option><option value="3" selected>3%</option><option value="5">5%</option><option value="7">7%</option><option value="10">10%</option></select>
</div>
<div class="form-group"><label for="manoObra">Tipo de mano de obra</label>
    <select id="manoObra"><option value="">-- Seleccione --</option><option value="precons">Precons III</option><option value="mipyme">MiPyme</option><option value="particular">Particular</option></select>
</div>
<button class="btn" id="calcularBtn">Calcular</button>

<div class="results" id="resultados">
    <h2>Resultado</h2>
    <table class="tabla-materiales"><thead><tr><th>Material</th><th>Cantidad</th><th>Unidad</th><th>Precio unit.</th><th>Importe</th></tr></thead><tbody></tbody></table>
    <p class="totales"><strong>Total Materiales:</strong> <span id="totalMateriales"></span> CUP</p>
    <table class="tabla-materiales"><thead><tr><th>Mano de obra</th><th>Hombres</th><th>Tiempo</th><th>Precio</th></tr></thead><tbody id="tablaManoObra"></tbody></table>
    <p class="totales"><strong>Total Mano de Obra:</strong> <span id="totalManoObra"></span> CUP</p>
    <p style="font-size:1.1rem;" class="totales"><strong>Gran Total:</strong> <span id="granTotal"></span> CUP</p>
    <button class="btn btn-copy" id="copiarBtn">📋 Copiar <span class="copy-notice" id="copyNotice">¡Copiado!</span></button>
    <div class="explanation" id="explicacion"></div>
</div>
</div>
<script>
(function(){
    const tipoEstr = document.getElementById('tipoEstructura');
    const dimsDiv = document.getElementById('opcionesDimensiones');
    const calcBtn = document.getElementById('calcularBtn');
    const resDiv = document.getElementById('resultados');

    const preciosMO = { precons:400, mipyme:320, particular:500 };

    function getVal(id,def=0){
        const el = document.getElementById(id);
        if(!el) return def;
        const v = parseFloat(el.value);
        return isNaN(v) ? def : v;
    }

    function actualizarDim(){
        const tipo = tipoEstr.value;
        let html = '';
        if(tipo === 'columna'){
            html = `<div class="row"><div class="form-group"><label>Lado X (cm)</label><input type="number" id="ladoX" placeholder="30" step="0.1"></div><div class="form-group"><label>Lado Y (cm)</label><input type="number" id="ladoY" placeholder="30" step="0.1"></div></div>
                    <div class="form-group"><label>Altura (m)</label><input type="number" id="altura" placeholder="2.5" step="0.01"></div>`;
        } else if(tipo === 'viga'){
            html = `<div class="row"><div class="form-group"><label>Base (cm)</label><input type="number" id="base" placeholder="25" step="0.1"></div><div class="form-group"><label>Peralte (cm)</label><input type="number" id="peralte" placeholder="40" step="0.1"></div></div>
                    <div class="form-group"><label>Longitud (m)</label><input type="number" id="longitud" placeholder="4.0" step="0.01"></div>`;
        } else if(tipo === 'losa'){
            html = `<div class="row"><div class="form-group"><label>Largo (m)</label><input type="number" id="largoLosa" placeholder="4.0" step="0.01"></div><div class="form-group"><label>Ancho (m)</label><input type="number" id="anchoLosa" placeholder="3.0" step="0.01"></div></div>
                    <div class="form-group"><label>Espesor (cm)</label><input type="number" id="espesorLosa" placeholder="15" step="0.1"></div>`;
        }
        dimsDiv.innerHTML = html;
    }
    tipoEstr.addEventListener('change', actualizarDim);
    actualizarDim();

    calcBtn.addEventListener('click', ()=>{
        const tipo = tipoEstr.value;
        const manoTipo = document.getElementById('manoObra').value;
        if(!tipo || !manoTipo){ alert('Seleccione tipo y mano de obra.'); return; }

        let volConcreto = 0;
        let areaEncofrado = 0;
        let explicacion = '';
        if(tipo === 'columna'){
            const x = getVal('ladoX',30)/100;
            const y = getVal('ladoY',30)/100;
            const h = getVal('altura',2.5);
            volConcreto = x*y*h;
            areaEncofrado = 2*(x+y)*h;
            explicacion = `Columna de ${x*100}x${y*100} cm, altura ${h} m.`;
        } else if(tipo === 'viga'){
            const b = getVal('base',25)/100;
            const p = getVal('peralte',40)/100;
            const l = getVal('longitud',4.0);
            volConcreto = b*p*l;
            areaEncofrado = (2*p + b)*l;
            explicacion = `Viga de ${b*100}x${p*100} cm, longitud ${l} m.`;
        } else if(tipo === 'losa'){
            const largo = getVal('largoLosa',4);
            const ancho = getVal('anchoLosa',3);
            const espesor = getVal('espesorLosa',15)/100;
            volConcreto = largo*ancho*espesor;
            areaEncofrado = largo*ancho;
            explicacion = `Losa maciza de ${largo}x${ancho} m, espesor ${espesor*100} cm.`;
        }

        const desperdicio = parseFloat(document.getElementById('desperdicio').value)/100;
        const cementoTipo = document.getElementById('tipoCemento').value;
        const precioCemento = getVal('precioCemento', cementoTipo==='P250'?350:380);
        const precioArena = getVal('precioArena',280);
        const precioGrava = getVal('precioGrava',300);
        const precioAcero = getVal('precioAcero',22);
        const cuantia = getVal('cuantiaAcero',100);
        const volDesp = volConcreto * (1+desperdicio);
        const cementoKg = 350 * volDesp;
        const cementoSacos = Math.ceil(cementoKg/42.5);
        const arenaM3 = 0.56 * volDesp;
        const gravaM3 = 0.84 * volDesp;
        const aguaLitros = Math.ceil(180 * volDesp);
        const aceroKg = cuantia * volDesp;

        const impCem = cementoSacos*precioCemento;
        const impAre = arenaM3*precioArena;
        const impGra = gravaM3*precioGrava;
        const impAgua = aguaLitros*0.10;
        const impAcero = aceroKg*precioAcero;
        const totalMat = impCem+impAre+impGra+impAgua+impAcero;

        let tabla = `<tr><td>Cemento ${cementoTipo}</td><td>${cementoSacos}</td><td>sacos</td><td>${precioCemento.toFixed(2)}</td><td>${impCem.toFixed(2)}</td></tr>
        <tr><td>Arena</td><td>${arenaM3.toFixed(2)}</td><td>m³</td><td>${precioArena.toFixed(2)}</td><td>${impAre.toFixed(2)}</td></tr>
        <tr><td>Grava</td><td>${gravaM3.toFixed(2)}</td><td>m³</td><td>${precioGrava.toFixed(2)}</td><td>${impGra.toFixed(2)}</td></tr>
        <tr><td>Agua</td><td>${aguaLitros}</td><td>litros</td><td>0.10</td><td>${impAgua.toFixed(2)}</td></tr>
        <tr><td>Acero ref. (${cuantia} kg/m³)</td><td>${aceroKg.toFixed(1)}</td><td>kg</td><td>${precioAcero.toFixed(2)}</td><td>${impAcero.toFixed(2)}</td></tr>`;
        document.querySelector('#tablaMateriales tbody').innerHTML = tabla;
        document.getElementById('totalMateriales').textContent = totalMat.toFixed(2);

        const horasM2 = tipo==='columna'?2.5 : tipo==='viga'?2.0 : 1.2;
        const horasTotal = horasM2 * (tipo==='losa'? areaEncofrado : volConcreto*10); // aproximación
        const totalHombres = 3;
        const dias = Math.ceil((horasTotal/(totalHombres*8))*10)/10;
        const precioMOm3 = preciosMO[manoTipo];
        const importeMO = precioMOm3 * volConcreto;
        document.getElementById('tablaManoObra').innerHTML = `<tr><td>${manoTipo==='precons'?'Precons III':manoTipo==='mipyme'?'MiPyme':'Particular'}</td><td>3 (2 of. + 1 ayud.)</td><td>${dias} día(s)</td><td>${importeMO.toFixed(2)} CUP</td></tr>`;
        document.getElementById('totalManoObra').textContent = importeMO.toFixed(2);
        document.getElementById('granTotal').textContent = (totalMat+importeMO).toFixed(2);
        document.getElementById('explicacion').textContent = explicacion + ' Concreto 1:3:3, f\'c=210 kg/cm².';
        resDiv.classList.add('visible');
    });
})();
</script>
</body>
</html>
