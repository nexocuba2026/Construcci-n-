<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Revestimientos</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter', sans-serif; background:#f5f5f7; color:#1d1d1f; padding:20px; display:flex; justify-content:center; align-items:flex-start; }
        .container { max-width:800px; width:100%; background:#fff; border-radius:24px; padding:36px 28px; box-shadow:0 8px 30px rgba(0,0,0,0.04); }
        .back-link { color:#86868b; text-decoration:none; font-size:0.9rem; display:block; margin-bottom:24px; }
        h1 { font-size:1.8rem; font-weight:600; margin-bottom:8px; }
        .subtitle { color:#86868b; margin-bottom:32px; }
        .form-group { margin-bottom:20px; }
        label { font-weight:500; font-size:0.9rem; display:block; margin-bottom:6px; }
        select, input { width:100%; padding:12px 16px; border:1px solid #d2d2d7; border-radius:12px; font-size:0.95rem; background:#f9f9fb; }
        .row { display:flex; gap:16px; flex-wrap:wrap; }
        .row .form-group { flex:1; min-width:140px; }
        .btn { width:100%; padding:14px; background:#1d1d1f; color:#fff; border:none; border-radius:14px; font-size:1rem; font-weight:500; cursor:pointer; margin-top:8px; }
        .results { margin-top:36px; padding:28px; background:#f9f9fb; border-radius:20px; display:none; overflow-x:auto; }
        .results.visible { display:block; }
        .tabla-materiales { width:100%; border-collapse:collapse; margin-bottom:20px; font-size:0.75rem; }
        .tabla-materiales th { text-align:left; color:#86868b; padding:6px 4px; border-bottom:1px solid #d2d2d7; }
        .tabla-materiales td { padding:6px 4px; border-bottom:1px solid #f0f0f2; }
        .totales { font-weight:600; margin-bottom:12px; }
        .explanation { margin-top:24px; font-size:0.8rem; color:#86868b; border-top:1px solid #e5e5ea; padding-top:16px; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Volver al inicio</a>
    <h1>Cálculo de Revestimientos</h1>
    <p class="subtitle">Repello grueso y revoque fino</p>

    <div class="form-group">
        <label for="tipoRevestimiento">Tipo</label>
        <select id="tipoRevestimiento">
            <option value="">-- Seleccione --</option>
            <option value="grueso">Repello grueso</option>
            <option value="fino">Revoque fino</option>
        </select>
    </div>
    <div class="row">
        <div class="form-group"><label>Largo (m)</label><input type="number" id="largo" placeholder="4.0" step="0.01"></div>
        <div class="form-group"><label>Alto (m)</label><input type="number" id="alto" placeholder="2.5" step="0.01"></div>
    </div>
    <div class="row">
        <div class="form-group"><label>Tipo cemento</label><select id="tipoCemento"><option value="P250">P-250</option><option value="P350">P-350</option></select></div>
        <div class="form-group"><label>Precio bolsa 42.5 kg</label><input type="number" id="precioCemento" placeholder="380"></div>
    </div>
    <div class="row">
        <div class="form-group"><label>Precio arena (CUP/m³)</label><input type="number" id="precioArena" placeholder="280"></div>
        <div class="form-group"><label>Espesor (cm)</label><input type="number" id="espesor" value="1.5" step="0.1"></div>
    </div>
    <div class="form-group"><label>Desperdicio (%)</label>
        <select id="desperdicio"><option value="0">0%</option><option value="3" selected>3%</option><option value="5">5%</option><option value="7">7%</option><option value="10">10%</option></select>
    </div>
    <div class="form-group"><label>Mano de obra</label>
        <select id="manoObra"><option value="">--</option><option value="precons">Precons III</option><option value="mipyme">MiPyme</option><option value="particular">Particular</option></select>
    </div>
    <button class="btn" id="calcularBtn">Calcular</button>

    <div class="results" id="resultados">
        <h2>Resultado</h2>
        <table class="tabla-materiales" id="tablaMateriales">
            <thead><tr><th>Material</th><th>Cantidad</th><th>Unidad</th><th>Precio unit.</th><th>Importe</th></tr></thead>
            <tbody></tbody>
        </table>
        <p class="totales"><strong>Total Materiales:</strong> <span id="totalMateriales"></span> CUP</p>
        <table class="tabla-materiales">
            <thead><tr><th>Mano de obra</th><th>Hombres</th><th>Tiempo</th><th>Precio</th></tr></thead>
            <tbody id="tablaManoObra"></tbody>
        </table>
        <p class="totales"><strong>Total Mano de Obra:</strong> <span id="totalManoObra"></span> CUP</p>
        <p style="font-size:1.1rem;" class="totales"><strong>Gran Total:</strong> <span id="granTotal"></span> CUP</p>
        <div class="explanation" id="explicacion"></div>
    </div>
</div>
<script>
(function(){
    const calcBtn = document.getElementById('calcularBtn');
    function getVal(id,def=0){ const el=document.getElementById(id); if(!el) return def; const v=parseFloat(el.value); return isNaN(v)?def:v; }
    calcBtn.addEventListener('click', ()=>{
        const tipo = document.getElementById('tipoRevestimiento').value;
        const largo = getVal('largo'), alto = getVal('alto');
        const espesor = getVal('espesor',1.5)/100;
        const desperdicio = parseFloat(document.getElementById('desperdicio').value)/100;
        const manoTipo = document.getElementById('manoObra').value;
        if(!tipo || isNaN(largo) || isNaN(alto) || largo<=0 || alto<=0 || !manoTipo){ alert('Complete los campos obligatorios.'); return; }
        const area = largo * alto;
        const volTotal = area * espesor * (1+desperdicio);
        const cementoTipo = document.getElementById('tipoCemento').value;
        const precioCemento = getVal('precioCemento', cementoTipo==='P250'?350:380);
        const precioArena = getVal('precioArena',280);
        const cementoKg = tipo==='grueso' ? 350*volTotal : 300*volTotal;
        const cementoSacos = Math.ceil(cementoKg/42.5);
        const arenaM3 = tipo==='grueso' ? 1.2*volTotal : 1.0*volTotal;
        const aguaLitros = Math.ceil(200*volTotal);
        const impCem = cementoSacos*precioCemento, impAre = arenaM3*precioArena, impAgua = aguaLitros*0.1;
        const totalMat = impCem+impAre+impAgua;
        document.querySelector('#tablaMateriales tbody').innerHTML = `
            <tr><td>Cemento ${cementoTipo}</td><td>${cementoSacos}</td><td>sacos</td><td>${precioCemento.toFixed(2)}</td><td>${impCem.toFixed(2)}</td></tr>
            <tr><td>Arena</td><td>${arenaM3.toFixed(2)}</td><td>m³</td><td>${precioArena.toFixed(2)}</td><td>${impAre.toFixed(2)}</td></tr>
            <tr><td>Agua</td><td>${aguaLitros}</td><td>litros</td><td>0.10</td><td>${impAgua.toFixed(2)}</td></tr>
        `;
        document.getElementById('totalMateriales').textContent = totalMat.toFixed(2);
        const preciosMO = { precons:250, mipyme:200, particular:320 };
        const importeMO = preciosMO[manoTipo]*area;
        document.getElementById('tablaManoObra').innerHTML = `<tr><td>${manoTipo==='precons'?'Precons III':manoTipo==='mipyme'?'MiPyme':'Particular'}</td><td>2 (1 of. + 1 ayud.)</td><td>${Math.ceil(area/8)} día(s)</td><td>${importeMO.toFixed(2)} CUP</td></tr>`;
        document.getElementById('totalManoObra').textContent = importeMO.toFixed(2);
        document.getElementById('granTotal').textContent = (totalMat+importeMO).toFixed(2);
        document.getElementById('explicacion').textContent = `Revestimiento ${tipo} de ${espesor*100} cm. Dosificación 1:3.`;
        document.getElementById('resultados').classList.add('visible');
    });
})();
</script>
</body>
</html>
