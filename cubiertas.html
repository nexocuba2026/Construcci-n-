<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Cubiertas</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter', sans-serif; background:#f5f5f7; padding:20px; display:flex; justify-content:center; }
        .container { max-width:800px; width:100%; background:#fff; border-radius:24px; padding:36px 28px; }
        .back-link { color:#86868b; text-decoration:none; margin-bottom:24px; display:block; }
        h1 { font-size:1.8rem; font-weight:600; }
        .form-group { margin-bottom:20px; }
        label { font-weight:500; font-size:0.9rem; display:block; margin-bottom:6px; }
        select, input { width:100%; padding:12px; border:1px solid #d2d2d7; border-radius:12px; }
        .row { display:flex; gap:16px; }
        .row .form-group { flex:1; }
        .btn { width:100%; padding:14px; background:#1d1d1f; color:#fff; border:none; border-radius:14px; cursor:pointer; margin-top:8px; }
        .results { margin-top:28px; padding:28px; background:#f9f9fb; border-radius:20px; display:none; }
        .results.visible { display:block; }
        .tabla-materiales { width:100%; border-collapse:collapse; font-size:0.75rem; margin-bottom:20px; }
        .tabla-materiales th { text-align:left; color:#86868b; padding:6px 4px; border-bottom:1px solid #d2d2d7; }
        .tabla-materiales td { padding:6px 4px; border-bottom:1px solid #f0f0f2; }
        .totales { font-weight:600; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Volver al inicio</a>
    <h1>Cálculo de Cubiertas</h1>
    <div class="form-group"><label>Tipo</label><select id="tipoCubierta"><option value="">--</option><option value="teja">Teja</option><option value="lamina">Lámina</option></select></div>
    <div class="row">
        <div class="form-group"><label>Largo (m)</label><input type="number" id="largo" placeholder="6"></div>
        <div class="form-group"><label>Ancho (m)</label><input type="number" id="ancho" placeholder="4"></div>
    </div>
    <div class="row">
        <div class="form-group"><label>Precio material (CUP/m²)</label><input type="number" id="precioMaterial" placeholder="200"></div>
        <div class="form-group"><label>Precio estructura (CUP/m²)</label><input type="number" id="precioEstructura" placeholder="150"></div>
    </div>
    <div class="form-group"><label>Desperdicio (%)</label><select id="desperdicio"><option>0</option><option selected>3</option><option>5</option><option>7</option><option>10</option></select></div>
    <div class="form-group"><label>Mano de obra</label><select id="manoObra"><option value="">--</option><option value="precons">Precons III</option><option value="mipyme">MiPyme</option><option value="particular">Particular</option></select></div>
    <button class="btn" id="calcularBtn">Calcular</button>
    <div class="results" id="resultados">
        <h2>Resultado</h2>
        <table class="tabla-materiales"><thead><tr><th>Material</th><th>Cantidad</th><th>Unidad</th><th>Precio unit.</th><th>Importe</th></tr></thead><tbody></tbody></table>
        <p class="totales"><strong>Total Materiales:</strong> <span id="totalMateriales"></span> CUP</p>
        <table class="tabla-materiales"><thead><tr><th>Mano de obra</th><th>Hombres</th><th>Tiempo</th><th>Precio</th></tr></thead><tbody id="tablaManoObra"></tbody></table>
        <p class="totales"><strong>Total Mano de Obra:</strong> <span id="totalManoObra"></span> CUP</p>
        <p style="font-size:1.1rem;"><strong>Gran Total:</strong> <span id="granTotal"></span> CUP</p>
    </div>
</div>
<script>
(function(){
    const calcBtn = document.getElementById('calcularBtn');
    function getVal(id,def=0){ const el=document.getElementById(id); if(!el) return def; const v=parseFloat(el.value); return isNaN(v)?def:v; }
    calcBtn.addEventListener('click', ()=>{
        const tipo = document.getElementById('tipoCubierta').value;
        const largo = getVal('largo'), ancho = getVal('ancho');
        if(!tipo || isNaN(largo) || isNaN(ancho) || largo<=0 || ancho<=0) return alert('Faltan datos');
        const area = largo*ancho;
        const desperdicio = parseFloat(document.getElementById('desperdicio').value)/100;
        const manoTipo = document.getElementById('manoObra').value;
        if(!manoTipo) return alert('Seleccione mano de obra');
        const areaDesp = area*(1+desperdicio);
        const pm = getVal('precioMaterial',200), pe = getVal('precioEstructura',150);
        const totalMat = areaDesp*pm + areaDesp*pe;
        document.querySelector('#tablaMateriales tbody').innerHTML = `<tr><td>Material cubierta</td><td>${areaDesp.toFixed(1)}</td><td>m²</td><td>${pm.toFixed(2)}</td><td>${(areaDesp*pm).toFixed(2)}</td></tr><tr><td>Estructura</td><td>${areaDesp.toFixed(1)}</td><td>m²</td><td>${pe.toFixed(2)}</td><td>${(areaDesp*pe).toFixed(2)}</td></tr>`;
        document.getElementById('totalMateriales').textContent = totalMat.toFixed(2);
        const preciosMO = { precons:250, mipyme:200, particular:320 };
        const importeMO = preciosMO[manoTipo]*area;
        document.getElementById('tablaManoObra').innerHTML = `<tr><td>${manoTipo==='precons'?'Precons III':manoTipo==='mipyme'?'MiPyme':'Particular'}</td><td>2</td><td>${Math.ceil(area/5)} día(s)</td><td>${importeMO.toFixed(2)} CUP</td></tr>`;
        document.getElementById('totalManoObra').textContent = importeMO.toFixed(2);
        document.getElementById('granTotal').textContent = (totalMat+importeMO).toFixed(2);
        document.getElementById('resultados').classList.add('visible');
    });
})();
</script>
</body>
</html>
