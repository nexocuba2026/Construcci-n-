<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cálculo de Cubiertas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px;}
.container{max-width:800px;width:100%;background:#fff;border-radius:24px;padding:36px 28px;box-shadow:0 8px 30px rgba(0,0,0,0.04);margin:20px 0;}
.back-link{display:inline-block;margin-bottom:24px;color:#86868b;text-decoration:none;}
.back-link:hover{color:#1d1d1f;}
h1{font-size:1.8rem;font-weight:600;margin-bottom:8px;}
.subtitle{font-size:0.95rem;color:#86868b;margin-bottom:32px;}
.form-group{margin-bottom:20px;}
label{display:block;font-weight:500;font-size:0.9rem;margin-bottom:6px;}
select,input{width:100%;padding:12px 16px;border:1px solid #d2d2d7;border-radius:12px;font-size:0.95rem;background:#f9f9fb;}
.row{display:flex;gap:16px;flex-wrap:wrap;}
.row .form-group{flex:1;min-width:140px;}
.btn{width:100%;padding:14px;background:#1d1d1f;color:#fff;border:none;border-radius:14px;font-size:1rem;cursor:pointer;margin-top:8px;}
.btn-copy{background:transparent;color:#1d1d1f;border:1px solid #d2d2d7;margin-top:12px;}
.results{margin-top:36px;padding:28px;background:#f9f9fb;border-radius:20px;display:none;overflow-x:auto;}
.results.visible{display:block;}
.tabla-materiales{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:0.75rem;}
.tabla-materiales th{text-align:left;font-weight:500;color:#86868b;padding:6px 4px;border-bottom:1px solid #d2d2d7;}
.tabla-materiales td{padding:6px 4px;border-bottom:1px solid #f0f0f2;}
.totales{font-weight:600;}
.explanation{margin-top:24px;font-size:0.8rem;color:#86868b;line-height:1.5;border-top:1px solid #e5e5ea;padding-top:16px;}
.copy-notice{display:inline-block;margin-left:8px;font-size:0.8rem;color:#34c759;opacity:0;}
.copy-notice.show{opacity:1;}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back-link">← Volver al inicio</a>
<h1>Cálculo de Cubiertas</h1>
<p class="subtitle">Tejas y láminas metálicas</p>

<div class="form-group"><label>Tipo de cubierta</label>
    <select id="tipoCubierta">
        <option value="">-- Seleccione --</option>
        <option value="teja">Teja cerámica/concreto</option>
        <option value="lamina">Lámina metálica</option>
    </select>
</div>

<div class="row">
    <div class="form-group"><label>Largo (m)</label><input type="number" id="largo" placeholder="6"></div>
    <div class="form-group"><label>Ancho (m)</label><input type="number" id="ancho" placeholder="4"></div>
</div>
<div class="row">
    <div class="form-group"><label>Precio material (CUP/m²)</label><input type="number" id="precioMaterial" placeholder="200"></div>
    <div class="form-group"><label>Precio estructura (CUP/m²)</label><input type="number" id="precioEstructura" placeholder="150"></div>
</div>
<div class="form-group"><label>Desperdicio (%)</label>
    <select id="desperdicio"><option>0</option><option selected>3</option><option>5</option><option>7</option><option>10</option></select>
</div>
<div class="form-group"><label>Mano de obra</label>
    <select id="manoObra"><option value="">--</option><option value="precons">Precons III</option><option value="mipyme">MiPyme</option><option value="particular">Particular</option></select>
</div>
<button class="btn" id="calcularBtn">Calcular</button>

<div class="results" id="resultados">
    <h2>Resultado</h2>
    <table class="tabla-materiales"><thead><tr><th>Material</th><th>Cantidad</th><th>Unidad</th><th>Precio unit.</th><th>Importe</th></tr></thead><tbody></tbody></table>
    <p class="totales"><strong>Total Materiales:</strong> <span id="totalMateriales"></span> CUP</p>
    <table class="tabla-materiales"><thead><tr><th>Mano de obra</th><th>Hombres</th><th>Tiempo</th><th>Precio</th></tr></thead><tbody id="tablaManoObra"></tbody></table>
    <p class="totales"><strong>Total Mano de Obra:</strong> <span id="totalManoObra"></span> CUP</p>
    <p style="font-size:1.1rem;" class="totales"><strong>Gran Total:</strong> <span id="granTotal"></span> CUP</p>
    <button class="btn btn-copy" id="copiarBtn">📋 Copiar <span class="copy-notice" id="copyNotice">¡Copiado!</span></button>
    <div class="explanation" id="explicacion"></div>
</div>
</div>
<script>
(function(){
    const calcBtn = document.getElementById('calcularBtn');
    function getVal(id,def=0){
        const el = document.getElementById(id);
        if(!el) return def;
        const v = parseFloat(el.value);
        return isNaN(v) ? def : v;
    }
    calcBtn.addEventListener('click', ()=>{
        const tipo = document.getElementById('tipoCubierta').value;
        const manoTipo = document.getElementById('manoObra').value;
        const largo = getVal('largo'), ancho = getVal('ancho');
        if(!tipo || !manoTipo || largo<=0 || ancho<=0){ alert('Complete datos'); return; }
        const area = largo*ancho;
        const desperdicio = parseFloat(document.getElementById('desperdicio').value)/100;
        const precioMat = getVal('precioMaterial',200);
        const precioEstr = getVal('precioEstructura',150);
        const areaDesp = area*(1+desperdicio);
        const impMat = areaDesp*precioMat;
        const impEstr = areaDesp*precioEstr;
        const totalMat = impMat+impEstr;

        let tabla = `<tr><td>Material cubierta</td><td>${areaDesp.toFixed(1)}</td><td>m²</td><td>${precioMat.toFixed(2)}</td><td>${impMat.toFixed(2)}</td></tr>
                     <tr><td>Estructura soporte</td><td>${areaDesp.toFixed(1)}</td><td>m²</td><td>${precioEstr.toFixed(2)}</td><td>${impEstr.toFixed(2)}</td></tr>`;
        document.querySelector('#tablaMateriales tbody').innerHTML = tabla;
        document.getElementById('totalMateriales').textContent = totalMat.toFixed(2);

        const preciosMO = { precons:250, mipyme:200, particular:320 };
        const importeMO = preciosMO[manoTipo]*area;
        document.getElementById('tablaManoObra').innerHTML = `<tr><td>${manoTipo==='precons'?'Precons III':manoTipo==='mipyme'?'MiPyme':'Particular'}</td><td>2 (1 of. + 1 ayud.)</td><td>${Math.ceil(area/5)} día(s)</td><td>${importeMO.toFixed(2)} CUP</td></tr>`;
        document.getElementById('totalManoObra').textContent = importeMO.toFixed(2);
        document.getElementById('granTotal').textContent = (totalMat+importeMO).toFixed(2);
        document.getElementById('explicacion').textContent = `Cubierta de ${tipo==='teja'?'tejas':'láminas'} con estructura de soporte.`;
        document.getElementById('resultados').classList.add('visible');
    });
})();
</script>
</body>
</html>
