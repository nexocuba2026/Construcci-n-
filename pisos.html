<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cálculo de Pisos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px;}
.container{max-width:800px;width:100%;background:#fff;border-radius:24px;padding:36px 28px;box-shadow:0 8px 30px rgba(0,0,0,0.04),0 2px 6px rgba(0,0,0,0.03);margin:20px 0;}
.back-link{display:inline-block;margin-bottom:24px;color:#86868b;text-decoration:none;font-size:0.9rem;transition:color 0.2s;}
.back-link:hover{color:#1d1d1f;}
h1{font-size:1.8rem;font-weight:600;letter-spacing:-0.5px;margin-bottom:8px;}
.subtitle{font-size:0.95rem;color:#86868b;margin-bottom:32px;}
.form-group{margin-bottom:20px;}
label{display:block;font-weight:500;font-size:0.9rem;margin-bottom:6px;color:#1d1d1f;}
select,input{width:100%;padding:12px 16px;border:1px solid #d2d2d7;border-radius:12px;font-size:0.95rem;font-family:inherit;background:#f9f9fb;transition:border-color 0.2s, box-shadow 0.2s;appearance:none;-webkit-appearance:none;}
select{background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2386868b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 12px center;background-size:18px;}
input:focus,select:focus{outline:none;border-color:#86868b;box-shadow:0 0 0 3px rgba(0,0,0,0.04);}
.row{display:flex;gap:16px;flex-wrap:wrap;}
.row .form-group{flex:1;min-width:140px;}
.btn{display:block;width:100%;padding:14px;background:#1d1d1f;color:#fff;border:none;border-radius:14px;font-size:1rem;font-weight:500;cursor:pointer;transition:background 0.2s,transform 0.1s;margin-top:8px;}
.btn:hover{background:#2d2d2f;}
.btn:active{transform:scale(0.98);}
.btn-copy{background:transparent;color:#1d1d1f;border:1px solid #d2d2d7;margin-top:12px;}
.btn-copy:hover{background:#f5f5f7;border-color:#86868b;}
.results{margin-top:36px;padding:28px;background:#f9f9fb;border-radius:20px;display:none;overflow-x:auto;}
.results.visible{display:block;}
.results h2{font-size:1.3rem;font-weight:600;margin-bottom:20px;}
.tabla-materiales{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:0.75rem;table-layout:auto;word-break:break-word;}
.tabla-materiales th{text-align:left;font-weight:500;color:#86868b;padding:6px 4px;border-bottom:1px solid #d2d2d7;white-space:nowrap;}
.tabla-materiales td{padding:6px 4px;border-bottom:1px solid #f0f0f2;vertical-align:top;}
.tabla-materiales tr:last-child td{border-bottom:none;}
.totales{font-weight:600;margin-bottom:12px;}
.explanation{margin-top:24px;font-size:0.8rem;color:#86868b;line-height:1.5;border-top:1px solid #e5e5ea;padding-top:16px;}
.sketch{margin:24px 0;padding:16px;background:#f9f9fb;border-radius:12px;text-align:center;display:none;}
.sketch.visible{display:block;}
.sketch svg{max-width:100%;height:auto;}
.copy-notice{display:inline-block;margin-left:8px;font-size:0.8rem;color:#34c759;opacity:0;transition:opacity 0.3s;}
.copy-notice.show{opacity:1;}
@media(max-width:480px){.container{padding:24px 18px;}.row{flex-direction:column;gap:0;}}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back-link">← Volver al inicio</a>
<h1>Cálculo de Pisos</h1>
<p class="subtitle">Acabados de piso: cerámica, porcelanato, concreto pulido</p>

<div class="form-group"><label for="tipoPiso">Tipo de piso</label>
    <select id="tipoPiso">
        <option value="">-- Seleccione --</option>
        <option value="ceramica">Cerámica / Porcelanato</option>
        <option value="concreto">Concreto pulido</option>
    </select>
</div>

<div id="opcionesExtras"></div>

<div class="row">
    <div class="form-group"><label for="largo">Largo (m)</label><input type="number" id="largo" placeholder="Ej. 4.0" step="0.01" min="0"></div>
    <div class="form-group"><label for="ancho">Ancho (m)</label><input type="number" id="ancho" placeholder="Ej. 3.0" step="0.01" min="0"></div>
</div>

<div class="form-group"><label for="desperdicio">Desperdicio (%)</label>
    <select id="desperdicio"><option value="0">0%</option><option value="3" selected>3%</option><option value="5">5%</option><option value="7">7%</option><option value="10">10%</option></select>
</div>
<div class="form-group"><label for="manoObra">Tipo de mano de obra</label>
    <select id="manoObra"><option value="">-- Seleccione --</option><option value="precons">Precons III</option><option value="mipyme">MiPyme</option><option value="particular">Particular</option></select>
</div>
<button class="btn" id="calcularBtn">Calcular</button>

<div class="sketch" id="sketchContainer"></div>
<div class="results" id="resultados">
    <h2>Resultado</h2>
    <table class="tabla-materiales"><thead><tr><th>Material</th><th>Cantidad</th><th>Unidad</th><th>Precio unit.</th><th>Importe</th></tr></thead><tbody></tbody></table>
    <p class="totales"><strong>Total Materiales:</strong> <span id="totalMateriales"></span> CUP</p>
    <table class="tabla-materiales"><thead><tr><th>Mano de obra</th><th>Hombres</th><th>Tiempo</th><th>Precio</th></tr></thead><tbody id="tablaManoObra"></tbody></table>
    <p class="totales"><strong>Total Mano de Obra:</strong> <span id="totalManoObra"></span> CUP</p>
    <p style="font-size:1.1rem;margin-top:12px;" class="totales"><strong>Gran Total:</strong> <span id="granTotal"></span> CUP</p>
    <button class="btn btn-copy" id="copiarBtn">📋 Copiar resultados <span class="copy-notice" id="copyNotice">¡Copiado!</span></button>
    <div class="explanation" id="explicacion"></div>
</div>
</div>
<script>
(function(){
    const tipoPiso = document.getElementById('tipoPiso');
    const extrasDiv = document.getElementById('opcionesExtras');
    const calcBtn = document.getElementById('calcularBtn');
    const resDiv = document.getElementById('resultados');

    const preciosMO = { precons:280, mipyme:220, particular:350 };

    function getVal(id,def=0){
        const el = document.getElementById(id);
        if(!el) return def;
        const v = parseFloat(el.value);
        return isNaN(v) ? def : v;
    }

    function actualizarExtras(){
        const tipo = tipoPiso.value;
        let html = '';
        if(tipo === 'ceramica'){
            html = `
                <div class="row">
                    <div class="form-group"><label for="precioCeramica">Precio cerámica (CUP/m²)</label><input type="number" id="precioCeramica" placeholder="200" step="0.01" min="0"></div>
                    <div class="form-group"><label for="precioAdhesivo">Precio adhesivo saco 25 kg</label><input type="number" id="precioAdhesivo" placeholder="150" step="0.01" min="0"></div>
                </div>
                <div class="row"><div class="form-group"><label for="precioFragua">Precio fragua (CUP/kg)</label><input type="number" id="precioFragua" placeholder="8" step="0.01" min="0"></div></div>`;
        } else if(tipo === 'concreto'){
            html = `
                <div class="row">
                    <div class="form-group"><label for="tipoCemento">Tipo de cemento</label><select id="tipoCemento"><option value="P250">P-250</option><option value="P350">P-350</option></select></div>
                    <div class="form-group"><label for="precioCemento">Precio bolsa 42.5 kg</label><input type="number" id="precioCemento" placeholder="380" step="0.01" min="0"></div>
                </div>
                <div class="row">
                    <div class="form-group"><label for="precioArena">Precio arena (CUP/m³)</label><input type="number" id="precioArena" placeholder="280" step="0.01" min="0"></div>
                    <div class="form-group"><label for="precioGrava">Precio grava (CUP/m³)</label><input type="number" id="precioGrava" placeholder="300" step="0.01" min="0"></div>
                </div>
                <div class="form-group"><label for="espesor">Espesor de concreto (cm)</label><input type="number" id="espesor" placeholder="10" step="0.1" min="5" value="10"></div>`;
        }
        extrasDiv.innerHTML = html;
    }
    tipoPiso.addEventListener('change', actualizarExtras);
    actualizarExtras();

    calcBtn.addEventListener('click', ()=>{
        const tipo = tipoPiso.value;
        const largo = getVal('largo');
        const ancho = getVal('ancho');
        const desperdicio = parseFloat(document.getElementById('desperdicio').value)/100;
        const manoTipo = document.getElementById('manoObra').value;
        if(!tipo || isNaN(largo) || isNaN(ancho) || largo<=0 || ancho<=0 || !manoTipo){
            alert('Complete todos los campos.');
            return;
        }
        const area = largo * ancho;
        let totalMat = 0;
        let tabla = '';
        let explicacion = '';

        if(tipo === 'ceramica'){
            const precioCer = getVal('precioCeramica',200);
            const precioAdh = getVal('precioAdhesivo',150);
            const precioFrag = getVal('precioFragua',8);
            const areaDesp = area*(1+desperdicio);
            const cerM2 = Math.ceil(areaDesp);
            const adhKg = areaDesp*4;
            const adhSacos = Math.ceil(adhKg/25);
            const fragKg = Math.ceil(area*0.3);
            const impCer = cerM2*precioCer;
            const impAdh = adhSacos*precioAdh;
            const impFrag = fragKg*precioFrag;
            totalMat = impCer+impAdh+impFrag;
            tabla = `<tr><td>Cerámica</td><td>${cerM2}</td><td>m²</td><td>${precioCer.toFixed(2)}</td><td>${impCer.toFixed(2)}</td></tr>
                     <tr><td>Adhesivo</td><td>${adhSacos}</td><td>saco 25kg</td><td>${precioAdh.toFixed(2)}</td><td>${impAdh.toFixed(2)}</td></tr>
                     <tr><td>Fragua</td><td>${fragKg}</td><td>kg</td><td>${precioFrag.toFixed(2)}</td><td>${impFrag.toFixed(2)}</td></tr>`;
            explicacion = 'Piso cerámico con adhesivo y fragua.';
        } else if(tipo === 'concreto'){
            const cementoTipo = document.getElementById('tipoCemento').value;
            const precioCemento = getVal('precioCemento', cementoTipo==='P250'?350:380);
            const precioArena = getVal('precioArena',280);
            const precioGrava = getVal('precioGrava',300);
            const espesorCm = getVal('espesor',10);
            const volConcreto = area * (espesorCm/100) * (1+desperdicio);
            const cementoKg = volConcreto * 350; // 350 kg/m³
            const cementoSacos = Math.ceil(cementoKg/42.5);
            const arenaM3 = volConcreto * 0.56;
            const gravaM3 = volConcreto * 0.84;
            const aguaLitros = Math.ceil(180*volConcreto);
            const impCem = cementoSacos*precioCemento;
            const impAre = arenaM3*precioArena;
            const impGra = gravaM3*precioGrava;
            const impAgu = aguaLitros*0.10;
            totalMat = impCem+impAre+impGra+impAgu;
            tabla = `<tr><td>Cemento ${cementoTipo}</td><td>${cementoSacos}</td><td>sacos</td><td>${precioCemento.toFixed(2)}</td><td>${impCem.toFixed(2)}</td></tr>
                     <tr><td>Arena</td><td>${arenaM3.toFixed(2)}</td><td>m³</td><td>${precioArena.toFixed(2)}</td><td>${impAre.toFixed(2)}</td></tr>
                     <tr><td>Grava</td><td>${gravaM3.toFixed(2)}</td><td>m³</td><td>${precioGrava.toFixed(2)}</td><td>${impGra.toFixed(2)}</td></tr>
                     <tr><td>Agua</td><td>${aguaLitros}</td><td>litros</td><td>0.10</td><td>${impAgu.toFixed(2)}</td></tr>`;
            explicacion = 'Piso de concreto pulido, dosificación 1:3:3.';
        }

        document.querySelector('#tablaMateriales tbody').innerHTML = tabla;
        document.getElementById('totalMateriales').textContent = totalMat.toFixed(2);

        const horasM2 = tipo==='ceramica'?0.7:1.0;
        const horasTotal = horasM2*area;
        const totalHombres = 2;
        const dias = Math.ceil((horasTotal/(totalHombres*8))*10)/10;
        const importeMO = preciosMO[manoTipo]*area;
        document.getElementById('tablaManoObra').innerHTML = `<tr><td>${manoTipo==='precons'?'Precons III':manoTipo==='mipyme'?'MiPyme':'Particular'}</td><td>2 (1 of. + 1 ayud.)</td><td>${dias} día(s)</td><td>${importeMO.toFixed(2)} CUP</td></tr>`;
        document.getElementById('totalManoObra').textContent = importeMO.toFixed(2);
        document.getElementById('granTotal').textContent = (totalMat+importeMO).toFixed(2);
        document.getElementById('explicacion').textContent = explicacion;
        resDiv.classList.add('visible');
    });
})();
</script>
</body>
</html>
