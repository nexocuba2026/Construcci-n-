<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Pisos</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter', sans-serif; background:#f5f5f7; padding:20px; display:flex; justify-content:center; }
        .container { max-width:800px; width:100%; background:#fff; border-radius:24px; padding:36px 28px; }
        .back-link { color:#86868b; text-decoration:none; margin-bottom:24px; display:block; }
        h1 { font-size:1.8rem; font-weight:600; }
        .subtitle { color:#86868b; }
        .form-group { margin-bottom:20px; }
        label { font-weight:500; font-size:0.9rem; display:block; margin-bottom:6px; }
        select, input { width:100%; padding:12px; border:1px solid #d2d2d7; border-radius:12px; font-size:0.95rem; }
        .row { display:flex; gap:16px; }
        .row .form-group { flex:1; }
        .btn { width:100%; padding:14px; background:#1d1d1f; color:#fff; border:none; border-radius:14px; margin-top:8px; cursor:pointer; }
        .results { margin-top:28px; padding:28px; background:#f9f9fb; border-radius:20px; display:none; overflow-x:auto; }
        .results.visible { display:block; }
        .tabla-materiales { width:100%; border-collapse:collapse; font-size:0.75rem; margin-bottom:20px; }
        .tabla-materiales th { text-align:left; color:#86868b; padding:6px 4px; border-bottom:1px solid #d2d2d7; }
        .tabla-materiales td { padding:6px 4px; border-bottom:1px solid #f0f0f2; }
        .totales { font-weight:600; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Volver al inicio</a>
    <h1>Cálculo de Pisos</h1>
    <p class="subtitle">Cerámica, porcelanato y concreto pulido</p>
    <div class="form-group"><label>Tipo</label><select id="tipoPiso"><option value="">--</option><option value="ceramica">Cerámica</option><option value="concreto">Concreto pulido</option></select></div>
    <div id="extras"></div>
    <div class="row">
        <div class="form-group"><label>Largo (m)</label><input type="number" id="largo" placeholder="4.0"></div>
        <div class="form-group"><label>Ancho (m)</label><input type="number" id="ancho" placeholder="3.0"></div>
    </div>
    <div class="form-group"><label>Desperdicio (%)</label><select id="desperdicio"><option value="0">0%</option><option value="3" selected>3%</option><option value="5">5%</option><option value="7">7%</option><option value="10">10%</option></select></div>
    <div class="form-group"><label>Mano de obra</label><select id="manoObra"><option value="">--</option><option value="precons">Precons III</option><option value="mipyme">MiPyme</option><option value="particular">Particular</option></select></div>
    <button class="btn" id="calcularBtn">Calcular</button>
    <div class="results" id="resultados">
        <h2>Resultado</h2>
        <table class="tabla-materiales" id="tablaMateriales">
            <thead><tr><th>Material</th><th>Cantidad</th><th>Unidad</th><th>Precio unit.</th><th>Importe</th></tr></thead>
            <tbody></tbody>
        </table>
        <p class="totales"><strong>Total Materiales:</strong> <span id="totalMateriales"></span> CUP</p>
        <table class="tabla-materiales">
            <thead><tr><th>Mano de obra</th><th>Hombres</th><th>Tiempo</th><th>Precio</th></tr></thead>
            <tbody id="tablaManoObra"></tbody>
        </table>
        <p class="totales"><strong>Total Mano de Obra:</strong> <span id="totalManoObra"></span> CUP</p>
        <p style="font-size:1.1rem;"><strong>Gran Total:</strong> <span id="granTotal"></span> CUP</p>
    </div>
</div>
<script>
(function(){
    const tipoPiso = document.getElementById('tipoPiso');
    const extrasDiv = document.getElementById('extras');
    const calcBtn = document.getElementById('calcularBtn');
    function getVal(id,def=0){ const el=document.getElementById(id); if(!el) return def; const v=parseFloat(el.value); return isNaN(v)?def:v; }
    tipoPiso.addEventListener('change', ()=>{
        if(tipoPiso.value==='ceramica'){
            extrasDiv.innerHTML = `<div class="row"><div class="form-group"><label>Precio cerámica (CUP/m²)</label><input type="number" id="precioCeramica" placeholder="200"></div><div class="form-group"><label>Adhesivo saco 25kg</label><input type="number" id="precioAdhesivo" placeholder="150"></div></div><div class="form-group"><label>Fragua (CUP/kg)</label><input type="number" id="precioFragua" placeholder="8"></div>`;
        } else if(tipoPiso.value==='concreto'){
            extrasDiv.innerHTML = `<div class="row"><div class="form-group"><label>Cemento</label><select id="tipoCemento"><option>P250</option><option>P350</option></select></div><div class="form-group"><label>Precio cemento</label><input type="number" id="precioCemento" placeholder="380"></div></div><div class="row"><div class="form-group"><label>Arena (m³)</label><input type="number" id="precioArena" placeholder="280"></div><div class="form-group"><label>Grava (m³)</label><input type="number" id="precioGrava" placeholder="300"></div></div><div class="form-group"><label>Espesor (cm)</label><input type="number" id="espesor" value="10" step="0.1"></div>`;
        } else extrasDiv.innerHTML = '';
    });
    calcBtn.addEventListener('click', ()=>{
        const tipo = tipoPiso.value;
        const largo = getVal('largo'), ancho = getVal('ancho');
        if(!tipo || isNaN(largo) || isNaN(ancho) || largo<=0 || ancho<=0) return alert('Faltan datos');
        const area = largo*ancho;
        const desperdicio = parseFloat(document.getElementById('desperdicio').value)/100;
        const manoTipo = document.getElementById('manoObra').value;
        if(!manoTipo) return alert('Seleccione mano de obra');
        let totalMat = 0, tabla = '';
        if(tipo==='ceramica'){
            const pc = getVal('precioCeramica',200), pa = getVal('precioAdhesivo',150), pf = getVal('precioFragua',8);
            const cerM2 = Math.ceil(area*(1+desperdicio));
            const adhSacos = Math.ceil(area*4/25);
            const fragKg = Math.ceil(area*0.3);
            tabla = `<tr><td>Cerámica</td><td>${cerM2}</td><td>m²</td><td>${pc.toFixed(2)}</td><td>${(cerM2*pc).toFixed(2)}</td></tr><tr><td>Adhesivo</td><td>${adhSacos}</td><td>sacos</td><td>${pa.toFixed(2)}</td><td>${(adhSacos*pa).toFixed(2)}</td></tr><tr><td>Fragua</td><td>${fragKg}</td><td>kg</td><td>${pf.toFixed(2)}</td><td>${(fragKg*pf).toFixed(2)}</td></tr>`;
            totalMat = cerM2*pc + adhSacos*pa + fragKg*pf;
        } else {
            const pc = getVal('precioCemento',380), pa = getVal('precioArena',280), pg = getVal('precioGrava',300);
            const esp = getVal('espesor',10)/100;
            const vol = area*esp*(1+desperdicio);
            const sacos = Math.ceil(350*vol/42.5);
            const arena = 0.56*vol, grava = 0.84*vol, agua = Math.ceil(180*vol);
            tabla = `<tr><td>Cemento</td><td>${sacos}</td><td>sacos</td><td>${pc.toFixed(2)}</td><td>${(sacos*pc).toFixed(2)}</td></tr><tr><td>Arena</td><td>${arena.toFixed(2)}</td><td>m³</td><td>${pa.toFixed(2)}</td><td>${(arena*pa).toFixed(2)}</td></tr><tr><td>Grava</td><td>${grava.toFixed(2)}</td><td>m³</td><td>${pg.toFixed(2)}</td><td>${(grava*pg).toFixed(2)}</td></tr><tr><td>Agua</td><td>${agua}</td><td>litros</td><td>0.10</td><td>${(agua*0.1).toFixed(2)}</td></tr>`;
            totalMat = sacos*pc + arena*pa + grava*pg + agua*0.1;
        }
        document.querySelector('#tablaMateriales tbody').innerHTML = tabla;
        document.getElementById('totalMateriales').textContent = totalMat.toFixed(2);
        const preciosMO = { precons:280, mipyme:220, particular:350 };
        const importeMO = preciosMO[manoTipo]*area;
        document.getElementById('tablaManoObra').innerHTML = `<tr><td>${manoTipo==='precons'?'Precons III':manoTipo==='mipyme'?'MiPyme':'Particular'}</td><td>2</td><td>${Math.ceil(area/6)} día(s)</td><td>${importeMO.toFixed(2)} CUP</td></tr>`;
        document.getElementById('totalManoObra').textContent = importeMO.toFixed(2);
        document.getElementById('granTotal').textContent = (totalMat+importeMO).toFixed(2);
        document.getElementById('explicacion')?.textContent = `Piso tipo ${tipo}.`;
        document.getElementById('resultados').classList.add('visible');
    });
})();
</script>
</body>
</html>
